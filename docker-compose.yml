name: selfceo-cms

services:
  payload:
    build:
      context: .
      target: builder
    entrypoint: ["/app/entrypoint.sh"]
    command: npm run dev
    ports:
      - "3901:3000"
    depends_on:
      payload-db:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://payload:password@payload-db:5432/selfceo_cms
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:-dev-secret-change-in-prod}
      NEXT_PUBLIC_SERVER_URL: http://192.168.66.41:3901
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: selfceo-media
      S3_REGION: us-east-1
    volumes:
      - .:/app
      - selfceo_node_modules:/app/node_modules
      - selfceo_next_cache:/app/.next
    networks:
      - 1panel-network

  payload-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: password
      POSTGRES_DB: selfceo_cms
    volumes:
      - /data/selfceo-cms/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payload -d selfceo_cms"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - 1panel-network

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9100:9000"
      - "9101:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - /data/selfceo-cms/minio:/data
    networks:
      - 1panel-network

volumes:
  selfceo_node_modules:
  selfceo_next_cache:

networks:
  1panel-network:
    external: true
